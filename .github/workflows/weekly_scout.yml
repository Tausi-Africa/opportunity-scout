# .github/workflows/weekly_scout.yml
# Runs every Monday at 07:00 Tanzania time (04:00 UTC)
# Manual trigger available via GitHub Actions UI

name: Weekly BSA Opportunity Scout

on:
  schedule:
    - cron: "0 4 * * MON"   # Every Monday 07:00 EAT
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 runtime

jobs:
  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v
        env:
          # Provide dummy values so imports don't fail during tests
          ANTHROPIC_API_KEY: dummy-key-for-tests
          SENDER_EMAIL: dummy@example.com
          SENDER_APP_PASSWORD: dummy-password

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_number }}
          path: .coverage
          retention-days: 14

  # ── Job 2: Scout (only runs if tests pass) ──────────────────────────────────
  scout:
    name: Scrape and report
    runs-on: ubuntu-latest
    needs: test          # blocked until test job succeeds
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify secrets are set
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL:        ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
        run: |
          MISSING=()
          [ -z "$ANTHROPIC_API_KEY" ]   && MISSING+=("ANTHROPIC_API_KEY")
          [ -z "$SENDER_EMAIL" ]        && MISSING+=("SENDER_EMAIL")
          [ -z "$SENDER_APP_PASSWORD" ] && MISSING+=("SENDER_APP_PASSWORD")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: The following secrets are not set in this repository:"
            for s in "${MISSING[@]}"; do echo "  • $s"; done
            echo ""
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

          echo "All secrets present:"
          echo "  ANTHROPIC_API_KEY   : ${#ANTHROPIC_API_KEY} chars (starts with ${ANTHROPIC_API_KEY:0:10}...)"
          echo "  SENDER_EMAIL        : $SENDER_EMAIL"
          echo "  SENDER_APP_PASSWORD : ${#SENDER_APP_PASSWORD} chars"

      - name: Test Claude API connectivity
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "=== DNS resolution ==="
          nslookup api.anthropic.com || true
          echo ""
          echo "=== Minimal Claude API call ==="
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Warning: ANTHROPIC_API_KEY not set — skipping API test"
            exit 0
          fi
          HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "authorization: Bearer ${ANTHROPIC_API_KEY}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-opus-4-1","max_tokens":5,"messages":[{"role":"user","content":"hi"}]}' \
            https://api.anthropic.com/v1/messages)
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$HTTP_RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Body: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Claude API returned HTTP $HTTP_STATUS — check ANTHROPIC_API_KEY secret"
            exit 1
          fi
          echo "Claude API connectivity: OK"

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run opportunity scout
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL:        ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
        run: python scripts/main.py

      - name: Upload Excel report as artifact
        uses: actions/upload-artifact@v4
        if: always()   # upload even if scout partially failed
        with:
          name: opportunity-report-${{ github.run_number }}
          path: |
            output/*.xlsx
            output/*.email_body.txt
          retention-days: 90
