# .github/workflows/weekly_scout.yml
# Runs every Monday at 07:00 Tanzania time (04:00 UTC)
# Manual trigger available via GitHub Actions UI
#
# AI assessment runs locally via Ollama (no external AI API key needed).
# Only required secrets: SENDER_EMAIL and SENDER_APP_PASSWORD (Gmail App Password).

name: Weekly BSA Opportunity Scout

on:
  schedule:
    - cron: "0 4 * * MON"   # Every Monday 07:00 EAT
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 runtime
  OLLAMA_MODEL: llama3.2:1b

jobs:
  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v
        env:
          # Provide dummy values so imports don't fail during tests
          SENDER_EMAIL: dummy@example.com
          SENDER_APP_PASSWORD: dummy-password

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_number }}
          path: .coverage
          retention-days: 14

  # ── Job 2: Scout (only runs if tests pass) ──────────────────────────────────
  scout:
    name: Scrape and report
    runs-on: ubuntu-latest
    needs: test          # blocked until test job succeeds
    timeout-minutes: 90  # Ollama CPU inference needs extra time

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL }}-v1
          restore-keys: ollama-${{ env.OLLAMA_MODEL }}

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          echo "Waiting for Ollama to start..."
          sleep 5
          echo "Pulling model $OLLAMA_MODEL ..."
          ollama pull "$OLLAMA_MODEL"
          echo "Model ready."

      - name: Verify email secrets are set
        env:
          SENDER_EMAIL:        ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
        run: |
          MISSING=()
          [ -z "$SENDER_EMAIL" ]        && MISSING+=("SENDER_EMAIL")
          [ -z "$SENDER_APP_PASSWORD" ] && MISSING+=("SENDER_APP_PASSWORD")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "WARNING: Email secrets not set — report will be saved as artifact only."
            echo "  Missing: ${MISSING[*]}"
            echo "  Go to: GitHub repo → Settings → Secrets and variables → Actions"
          else
            echo "Email secrets present:"
            echo "  SENDER_EMAIL        : $SENDER_EMAIL"
            echo "  SENDER_APP_PASSWORD : ${#SENDER_APP_PASSWORD} chars"
          fi

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run opportunity scout
        env:
          OLLAMA_HOST:         http://localhost:11434
          OLLAMA_MODEL:        ${{ env.OLLAMA_MODEL }}
          SENDER_EMAIL:        ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
        run: python scripts/main.py

      - name: Upload Excel report as artifact
        uses: actions/upload-artifact@v4
        if: always()   # upload even if scout partially failed
        with:
          name: opportunity-report-${{ github.run_number }}
          path: |
            output/*.xlsx
            output/*.email_body.txt
          retention-days: 90
