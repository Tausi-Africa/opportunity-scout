# .github/workflows/weekly_scout.yml
# Runs every Monday at 07:00 Tanzania time (04:00 UTC)
# Manual trigger available via GitHub Actions UI

name: Weekly BSA Opportunity Scout

on:
  schedule:
    - cron: "0 4 * * MON"   # Every Monday 07:00 EAT
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 runtime

jobs:
  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v
        env:
          # Provide dummy values so imports don't fail during tests
          ANTHROPIC_API_KEY: dummy-key-for-tests
          SENDER_EMAIL: dummy@example.com
          SENDER_APP_PASSWORD: dummy-password

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_number }}
          path: .coverage
          retention-days: 14

  # ── Job 2: Scout (only runs if tests pass) ──────────────────────────────────
  scout:
    name: Scrape and report
    runs-on: ubuntu-latest
    needs: test          # blocked until test job succeeds
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run opportunity scout
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL:        ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
        run: python scripts/main.py

      - name: Upload Excel report as artifact
        uses: actions/upload-artifact@v4
        if: always()   # upload even if scout partially failed
        with:
          name: opportunity-report-${{ github.run_number }}
          path: |
            output/*.xlsx
            output/*.email_body.txt
          retention-days: 90
